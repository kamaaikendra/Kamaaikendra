            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgeZQoKjM5USxhnGVsDfNKDaa4izjCIdzl0ClY7rl5fGVazetm9nFPFSO7rI6vzjPT9B8fnWf7cCfcItWHPEwLr0dtdA-O-f_JIH9UXdnruxbA0xDsLRC8ipXvI6e1aDTpnLDrLlo6jFlyisf3kJnhepyzWzSYGZr1Lf4LDML5jSt-BvU62_TTFQhYC5fA/s16000/1000115181.png" alt="" class="coin-icon" onclick="window.location.href='deposit.html'">
            <div class="balance-amount" id="balance">0.00</div>

</div>

<div id="productsSearchSection" class="search-section">

            <span id="selectedDateLabel"></span>
            <i class="fas fa-caret-down"></i>
        </div>
        <div class="dropdown-list" id="dropdownList">
            </div>
    </div>

        <div class="daily-balance-amount" id="dailyNetAmount">0.00</div>
    </div>
</div>

<div id="home" class="section active">
    <div class="plans-list" id="plansContainer"></div>
</div>

    <div id="historyEntries" style="padding-top:100px;"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" data-section="home"><i class="fas fa-store"></i><span>Products</span></div>
    <div class="nav-item" data-section="history"><i class="fas fa-clock"></i><span>History</span></div>
</div>

<div id="productHistoryModal" class="modal-overlay">
    <div class="product-modal">
        <div class="modal-header">
            <h3 id="modalPlanTitle">History</h3>
            <button class="close-modal" onclick="closeProductModal()">&times;</button>
        </div>
        <div id="modalReturnsInfo" style="margin-bottom:15px; font-weight:bold; color:#8e54e9;">Loading...</div>
        <div id="modalInvestmentsList">No investments yet</div>
    </div>
</div>

<!-- New Insufficient Balance Popup -->
<div id="insufficientModal" class="insufficient-modal-overlay">
    <div class="insufficient-modal-card">
        <button class="close-insufficient" id="closeInsufficientBtn">&times;</button>
        <div class="insufficient-icon"><i class="fas fa-wallet"></i></div>
        <div class="insufficient-title">Low Balance</div>
        <div class="insufficient-message">Add cash to your wallet to invest and start earning daily returns.</div>
        <button class="insufficient-add-cash-btn" id="addCashFromPopupBtn"><i class="fas fa-plus-circle"></i> Add Cash</button>
    </div>
</div>

<div id="loading" class="loading"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
<div id="toastContainer" class="toast-container"></div>

<script>
    const HARDCODED_PLANS = [
        { id: "plan_a", plantitle: "Product A", investmentamount: 295, dailyReturnAmount: 225, totalDays: 3, serialNo: 1 },
        { id: "plan_b", plantitle: "Product B", investmentamount: 695, dailyReturnAmount: 250, totalDays: 6, serialNo: 2 },
        { id: "plan_c", plantitle: "Product C", investmentamount: 1595, dailyReturnAmount: 265, totalDays: 12, serialNo: 3 },
        { id: "plan_d", plantitle: "Product D", investmentamount: 2995, dailyReturnAmount: 250, totalDays: 24, serialNo: 4 },
        { id: "plan_e", plantitle: "Product E", investmentamount: 3995, dailyReturnAmount: 195, totalDays: 48, serialNo: 5 },
        { id: "plan_f", plantitle: "Product F", investmentamount: 6995, dailyReturnAmount: 255, totalDays: 56, serialNo: 6 },
        { id: "plan_g", plantitle: "Product G", investmentamount: 19995, dailyReturnAmount: 1200, totalDays: 84, serialNo: 7 },
        { id: "plan_h", plantitle: "Product H", investmentamount: 29995, dailyReturnAmount: 3200, totalDays: 40, serialNo: 8 },
        { id: "plan_i", plantitle: "Product I", investmentamount: 39995, dailyReturnAmount: 6000, totalDays: 35, serialNo: 9 },
        { id: "plan_j", plantitle: "Product J", investmentamount: 795, dailyReturnAmount: 500, totalDays: 3, serialNo: 10 },
    ];

    const PRODUCT_LOGOS = {
        1:"https://spribe.co/assets/images/games/Av-new@2x.png?v=2.5.61",
        2:"https://spribe.co/assets/images/games/trader@2x.png?v=2.5.61",
        3:"https://spribe.co/assets/images/games/Mi@2x.png?v=2.5.61", 
        4:"https://spribe.co/assets/images/games/Go@2x.png?v=2.5.61", 
        5:"https://spribe.co/assets/images/games/Hi@2x.png?v=2.5.61",
        6:"https://spribe.co/assets/images/games/Pl@2x.png?v=2.5.61", 
        7:"https://spribe.co/assets/images/games/Ba@2x.png?v=2.5.61", 
        8:"https://spribe.co/assets/images/games/Di@2x.png?v=2.5.61",
        9:"https://spribe.co/assets/images/games/Ho.png?v=2.5.61",
        10:"https://spribe.co/assets/images/games/Ke@2x.png?v=2.5.61"};
    function getProductLogoSrc(serialNo) { return PRODUCT_LOGOS[serialNo] || `#imagelogo(${serialNo}).png`; }

    const firebaseConfig = {
  apiKey: "AIzaSyAfVcC_wBMaarOExZVrUeqZf65NzT7BCfU",
  authDomain: "kamaaikendra-546d6.firebaseapp.com",
  databaseURL: "https://kamaaikendra-546d6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kamaaikendra-546d6",
  storageBucket: "kamaaikendra-546d6.firebasestorage.app",
  messagingSenderId: "878228615894",
  appId: "1:878228615894:web:c3660d7510fb05d0d54f77"
};
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let state = { uid: null, authed: false, balance: 0, plans: [...HARDCODED_PLANS], dailyReturnInvestments: [], transactionRecords: [] };
    let currentFilterDate = null;

    function generateTransactionId() {
        const array = new Uint32Array(3);
        crypto.getRandomValues(array);
        const now = new Date();
        const year = now.getFullYear().toString().slice(-2);
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const day = now.getDate().toString().padStart(2, '0');
        const random1 = (array[0] % 1000000).toString().padStart(6, '0');
        return year + month + day + random1;
    }

    function showToast(msg) { const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg; container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10); setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000); }
    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }
    function updateBalanceUI() { document.getElementById('balance').innerText = state.balance.toFixed(2); }
    
    function saveTransactionRecord(type, amount, balanceAfter, description, transactionName, isIncome) { 
        if (!state.uid) return Promise.resolve(); 
        const transactionId = generateTransactionId();
        const record = { type, amount, description, transactionName, timestamp: Date.now(), balanceAfter, isIncome, transactionId }; 
        return db.ref(`appusers/${state.uid}/transactionRecords`).push(record); 
    }
    
    function loadTransactionRecords() { 
        if (!state.uid) return; 
        db.ref(`appusers/${state.uid}/transactionRecords`).on('value', snap => { 
            state.transactionRecords = Object.values(snap.val() || {}).sort((a,b)=>b.timestamp - a.timestamp); 
            renderHistoryUI(); 
        }); 
    }
    
    function renderHistoryUI() {
        const container = document.getElementById('historyEntries');
        let filtered = [...state.transactionRecords];
        filtered = filtered.filter(rec => {
            const recDate = new Date(rec.timestamp);
            let rDay = String(recDate.getDate()).padStart(2, '0');
            let rMonth = String(recDate.getMonth() + 1).padStart(2, '0');
            let rYear = recDate.getFullYear();
            let recDateStr = `${rYear}-${rMonth}-${rDay}`;
            return recDateStr === currentFilterDate;
        });
        let net = 0;
        filtered.forEach(rec => { net += rec.amount; });
        const netElem = document.getElementById('dailyNetAmount');
        if(netElem) netElem.innerText = (net >= 0 ? `+₹${net.toFixed(2)}` : `-₹${Math.abs(net.toFixed(2))}`);
        if(filtered.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px; color:white;">No transactions on this date</div>'; return; }
        let html = '';
        filtered.forEach(rec => {
            const sign = rec.isIncome ? '+' : '-';
            const cls = rec.isIncome ? 'positive' : 'negative';
            const d = new Date(rec.timestamp);
            const dateFmt = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
            const displayId = rec.transactionId || 'N/A';
            const formattedId = displayId.length === 12 ? `${displayId.slice(0, 2)}-${displayId.slice(2, 6)}-${displayId.slice(6, 12)}` : displayId;
            html += `<div class="transaction-item"><div class="tx-left"><div class="tx-title">${rec.transactionName || rec.description}</div><div class="tx-id-badge">${formattedId}</div></div><div class="tx-right"><div class="tx-amount ${cls}">${sign}₹${Math.abs(rec.amount).toFixed(2)}</div><div class="tx-date">${dateFmt}</div></div></div>`;
        });
        container.innerHTML = html;
    }
    
    function setFilterDate(dateValue) {
        if(!dateValue) {
            let td = new Date();
            let day = String(td.getDate()).padStart(2, '0');
            let month = String(td.getMonth() + 1).padStart(2, '0');
            let year = td.getFullYear();
            currentFilterDate = `${year}-${month}-${day}`; 
            document.getElementById('selectedDateLabel').innerText = `${day}-${month}-${year}`;
        } else { currentFilterDate = dateValue; }
        renderHistoryUI();
        return true;
    }
    
    function initCustomDropdown() {
        const header = document.getElementById('dropdownHeader');
        const list = document.getElementById('dropdownList');
        const label = document.getElementById('selectedDateLabel');
        list.innerHTML = '';
        for(let i=0; i<30; i++) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            let day = String(d.getDate()).padStart(2, '0');
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let year = d.getFullYear();
            let dateStr = `${day}-${month}-${year}`;
            let isoDate = `${year}-${month}-${day}`;
            let item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerText = dateStr;
            item.onclick = () => {
                label.innerText = dateStr;
                list.classList.remove('show');
                setFilterDate(isoDate);
            };
            list.appendChild(item);
        }
        let d = new Date();
        let day = String(d.getDate()).padStart(2, '0');
        let month = String(d.getMonth() + 1).padStart(2, '0');
        let year = d.getFullYear();
        label.innerText = `${day}-${month}-${year}`;
        header.addEventListener('click', () => { list.classList.toggle('show'); });
        window.addEventListener('click', (e) => { if (!document.getElementById('dateDropdown').contains(e.target)) list.classList.remove('show'); });
    }
    
    function loadInvestmentsData() { if (!state.uid) return; db.ref(`appusers/${state.uid}/dailyReturnInvestments`).on('value', snap => { state.dailyReturnInvestments = Object.entries(snap.val() || {}).map(([id,val])=>({id,...val})); renderPlansUI(); }); }
    async function claimDailyReturn(investmentId, planId) { const investment = state.dailyReturnInvestments.find(i=> i.id === investmentId); const plan = state.plans.find(p=> p.id === planId); if(!investment || investment.remainingDays <= 0) return; const todayStr = new Date().toDateString(); const lastReturnDateStr = investment.lastReturnDate ? new Date(investment.lastReturnDate).toDateString() : ''; if(lastReturnDateStr === todayStr) { showToast("Already claimed today!"); return; } showLoading(); try { await db.ref(`appusers/${state.uid}/totalBalance`).transaction(bal => (bal||0) + plan.dailyReturnAmount); const updates = { [`appusers/${state.uid}/dailyReturnInvestments/${investmentId}/remainingDays`]: investment.remainingDays - 1, [`appusers/${state.uid}/dailyReturnInvestments/${investmentId}/lastReturnDate`]: Date.now(), [`appusers/${state.uid}/dailyReturnInvestments/${investmentId}/totalReturnsReceived`]: (investment.totalReturnsReceived||0) + plan.dailyReturnAmount }; if(investment.remainingDays - 1 <= 0) updates[`appusers/${state.uid}/dailyReturnInvestments/${investmentId}/status`] = 'completed'; await db.ref().update(updates); await saveTransactionRecord('daily_return', plan.dailyReturnAmount, state.balance + plan.dailyReturnAmount, `Return - ${plan.plantitle}`, plan.plantitle, true); showToast(`₹${plan.dailyReturnAmount.toFixed(2)} claimed!`); } catch(e) { showToast("Claim failed"); } finally { hideLoading(); } }
    
    // Updated invest function: shows professional popup on insufficient balance instead of toast
    async function investInPlan(planId) { 
        const plan = state.plans.find(p=> p.id === planId); 
        if(!plan) return; 
        if(state.balance < plan.investmentamount) {
            // Show engaging professional popup
            const modal = document.getElementById('insufficientModal');
            modal.classList.add('active');
            return;
        } 
        const activeInv = state.dailyReturnInvestments.find(inv => inv.planId === planId && inv.status === 'active' && inv.remainingDays > 0); 
        if(activeInv) { showToast("You already have an active investment for this product."); return; } 
        showLoading(); 
        try { 
            const deductionRes = await db.ref(`appusers/${state.uid}/totalBalance`).transaction(bal => { let current = bal || 0; if(current < plan.investmentamount) return undefined; return current - plan.investmentamount; }); 
            if(!deductionRes.committed) { showToast("Insufficient balance check failed"); hideLoading(); return; } 
            const newInv = { planId: plan.id, planName: plan.plantitle, amount: plan.investmentamount, dailyReturnAmount: plan.dailyReturnAmount, totalDays: plan.totalDays, remainingDays: plan.totalDays, status: 'active', startDate: Date.now(), lastReturnDate: 0, totalReturnsReceived: 0 }; 
            await db.ref(`appusers/${state.uid}/dailyReturnInvestments`).push(newInv); 
            await saveTransactionRecord('investment', -plan.investmentamount, state.balance - plan.investmentamount, `Investment in ${plan.plantitle}`, plan.plantitle, false); 
            showToast(`Successfully invested in ${plan.plantitle}`); 
        } catch(e) { showToast("Investment failed"); } finally { hideLoading(); } 
    }
    
    function renderPlansUI() { const container = document.getElementById('plansContainer'); container.innerHTML = ''; state.plans.forEach(plan => { const totalReturn = plan.dailyReturnAmount * plan.totalDays; const activeInvestment = state.dailyReturnInvestments.find(inv => inv.planId === plan.id && inv.status === 'active' && inv.remainingDays > 0); let btnHtml = ''; if(activeInvestment) { const canClaimToday = (() => { if(!activeInvestment.lastReturnDate) return true; return new Date(activeInvestment.lastReturnDate).toDateString() !== new Date().toDateString(); })(); btnHtml = `<button class="card-btn ${canClaimToday ? 'claim-btn' : 'claimed-btn'}" onclick="event.stopPropagation(); ${canClaimToday ? `claimDailyReturn('${activeInvestment.id}','${plan.id}')` : ''}">${canClaimToday ? 'Claim Return' : 'Claimed Today'}</button>`; } else { btnHtml = `<button class="card-btn" onclick="event.stopPropagation(); investInPlan('${plan.id}')">Invest</button>`; } const logoSrc = getProductLogoSrc(plan.serialNo); const card = document.createElement('div'); card.className = 'plan-card'; card.onclick = (e) => { if(!e.target.closest('button')) openProductHistoryModal(plan.id); }; card.innerHTML = `<div class="plan-badge">Days: ${plan.totalDays}</div><div class="card-top"><div class="card-image-wrapper"><img class="product-logo-img" src="${logoSrc}" alt="" onerror="this.onerror=null; this.classList.add('error-fallback'); this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%238e54e9\'/><text x=\'50\' y=\'55\' font-size=\'12\' text-anchor=\'middle\' fill=\'white\' font-weight=\'bold\'>${plan.plantitle.charAt(0)}</text></svg>';"></div><div class="card-info"><div class="card-title">${plan.plantitle}</div><div class="card-stats"><div class="stat-col"><span class="stat-val">₹${plan.dailyReturnAmount}</span><span class="stat-lbl">Daily Income</span></div><div class="stat-col"><span class="stat-val">₹${totalReturn}</span><span class="stat-lbl">Total Income</span></div></div></div></div><div class="card-bottom"><div class="card-price">Price: ₹${plan.investmentamount}</div>${btnHtml}</div>`; container.appendChild(card); }); performSearch(); }
    function openProductHistoryModal(planId) { const plan = state.plans.find(p=> p.id === planId); if(!plan) return; document.getElementById('modalPlanTitle').innerText = `${plan.plantitle} History`; const allInvestments = state.dailyReturnInvestments.filter(inv => inv.planId === planId); let totalCollected = 0, historyHtml = ''; allInvestments.forEach(inv => { totalCollected += (inv.totalReturnsReceived || 0); const statusText = inv.status === 'completed' ? 'Completed' : (inv.remainingDays > 0 ? 'Active' : 'Expired'); historyHtml += `<div class="history-item"><strong>Status: ${statusText}</strong><br>Invested: ₹${inv.amount}<br>Collected: ₹${(inv.totalReturnsReceived||0).toFixed(2)}<br><small>${new Date(inv.startDate).toLocaleString('en-IN')}</small></div>`; }); document.getElementById('modalInvestmentsList').innerHTML = historyHtml || '<div style="text-align:center;color:#888;">No history found</div>'; document.getElementById('modalReturnsInfo').innerHTML = `Total Lifetime Mined: ₹${totalCollected.toFixed(2)}`; document.getElementById('productHistoryModal').classList.add('active'); }
    function closeProductModal() { document.getElementById('productHistoryModal').classList.remove('active'); }
    function subscribeBalance() { if(!state.uid) return; db.ref(`appusers/${state.uid}/totalBalance`).on('value', snap => { state.balance = parseFloat(snap.val() || 0); updateBalanceUI(); }); }
    function performSearch() { const term = document.getElementById('planSearchInput').value.trim().toLowerCase(); document.querySelectorAll('.plan-card').forEach(card => { const title = card.querySelector('.card-title')?.innerText.toLowerCase() || ''; card.style.display = (term === '' || title.includes(term)) ? 'block' : 'none'; }); }
    async function initUser() { if(!state.uid) return; const snap = await db.ref(`appusers/${state.uid}/totalBalance`).once('value'); if(snap.val() === null) await db.ref(`appusers/${state.uid}/totalBalance`).set(0); subscribeBalance(); loadInvestmentsData(); loadTransactionRecords(); }
    
    auth.onAuthStateChanged(user => { if(user) { state.uid = user.uid; state.authed = true; initUser(); } else window.location.href = 'index.html'; });
    
    document.addEventListener('DOMContentLoaded', () => {
        const productsSearchDiv = document.getElementById('productsSearchSection');
        const historyFilterDiv = document.getElementById('historyFilterSection');
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const sectionId = btn.getAttribute('data-section');
                document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
                document.getElementById(sectionId).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                btn.classList.add('active');
                if(sectionId === 'home') {
                    productsSearchDiv.style.display = 'flex';
                    historyFilterDiv.style.display = 'none';
                } else {
                    productsSearchDiv.style.display = 'none';
                    historyFilterDiv.style.display = 'flex';
                    setFilterDate(null);
                    renderHistoryUI();
                }
            });
        });
        document.getElementById('searchButton').addEventListener('click', performSearch);
        document.getElementById('planSearchInput').addEventListener('input', performSearch);
        initCustomDropdown();
        setFilterDate(null);
        
        // Popup controls: close button & add cash navigation
        const insModal = document.getElementById('insufficientModal');
        const closeInsBtn = document.getElementById('closeInsufficientBtn');
        const addCashBtn = document.getElementById('addCashFromPopupBtn');
        function closeInsufficientModal() { insModal.classList.remove('active'); }
        closeInsBtn.addEventListener('click', closeInsufficientModal);
        addCashBtn.addEventListener('click', () => {
            closeInsufficientModal();
            window.location.href = 'deposit.html';
        });
        insModal.addEventListener('click', (e) => {
            if(e.target === insModal) closeInsufficientModal();
        });
    });
</script>
