// Audio Context for better performance
let audioContext;
let isAudioContextInitialized = false;

// SFX Pool System
const SFX_POOL_SIZE = 5; // Number of audio buffers per sound for concurrent playback
const sfxBuffers = {};
const sfxPool = {};

// Sound URLs - UPDATED WITH EXISTING SOUNDS
const soundUrls = {
    click: 'https://audio.jukehost.co.uk/dJcPA33b1HQxZbNuq3SCyi9ejzBKXHJM',
    textSent: 'https://audio.jukehost.co.uk/tMjUwMh72dCLHpwFFKA7rvO94lPtQmfu',
    photoSent: 'https://audio.jukehost.co.uk/PYHf3UV3PYLswk1z10xJmvv08zkZ2yrO',
    textReceive: 'https://audio.jukehost.co.uk/BCK6GD7QMUrg43ijDqpM6jRowlk0oLve',
    photoReceive: 'https://audio.jukehost.co.uk/t7VUPlvDODGe7LbQGo2fLZo7PX1yOU9R',
    error: 'https://audio.jukehost.co.uk/4Uj1GPG7G07rx3FJCXKbYLRopwZEvEKj',
    success: 'https://audio.jukehost.co.uk/vUtJ3iuXKU8Z1jLmQqBw5zvPU9CsiUsW',
    warning: 'https://audio.jukehost.co.uk/ev8tWw7FtuqIh7UZacocfiWqukpyxgeV'
};

// Fallback audio elements
let fallbackAudioElements = {};

// Initialize Audio System
function initializeAudioSystem() {
    try {
        // Create Audio Context
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        isAudioContextInitialized = true;
        
        // Preload all sound effects
        preloadAllSounds();
        
        console.log('Audio system initialized successfully');
    } catch (error) {
        console.error('Failed to initialize audio system:', error);
        // Fallback to HTML5 Audio
        initializeFallbackAudio();
    }
}

// Fallback to HTML5 Audio if Web Audio API fails
function initializeFallbackAudio() {
    // Create fallback audio elements for sound effects only
    for (const [key, url] of Object.entries(soundUrls)) {
        if (url && !url.includes('placeholder')) {
            fallbackAudioElements[key] = new Audio(url);
            fallbackAudioElements[key].preload = 'auto';
        }
    }
}

// Preload all sound effects
async function preloadAllSounds() {
    if (!isAudioContextInitialized) return;
    
    for (const [soundName, url] of Object.entries(soundUrls)) {
        try {
            // Skip placeholder sounds
            if (!url || url.includes('placeholder')) continue;
            
            // Fetch and decode audio
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            
            // Store the decoded buffer
            sfxBuffers[soundName] = audioBuffer;
            
            // Initialize pool for this sound
            sfxPool[soundName] = [];
            for (let i = 0; i < SFX_POOL_SIZE; i++) {
                sfxPool[soundName].push({
                    buffer: audioBuffer,
                    source: null,
                    lastPlayed: 0
                });
            }
            
            console.log(`Preloaded sound: ${soundName}`);
        } catch (error) {
            console.error(`Failed to preload sound ${soundName}:`, error);
        }
    }
}

// Play sound effect using pool system
function playSound(soundName) {
    try {
        // Skip placeholder sounds
        if (soundUrls[soundName] && soundUrls[soundName].includes('placeholder')) {
            return;
        }
        
        if (!isAudioContextInitialized || !sfxPool[soundName]) {
            // Fallback to HTML5 Audio
            playFallbackSound(soundName);
            return;
        }
        
        // Resume audio context if suspended (required by browsers)
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        
        // Find available sound from pool
        const pool = sfxPool[soundName];
        const now = Date.now();
        
        // Try to find a sound that's not currently playing
        for (const sound of pool) {
            if (!sound.source || sound.source.playbackState === sound.source.FINISHED) {
                playSoundFromPool(sound);
                return;
            }
        }
        
        // If all sounds are playing, use the one that was played least recently
        let oldestSound = pool[0];
        for (const sound of pool) {
            if (sound.lastPlayed < oldestSound.lastPlayed) {
                oldestSound = sound;
            }
        }
        
        playSoundFromPool(oldestSound);
        
    } catch (error) {
        console.error('Error playing sound:', error);
        playFallbackSound(soundName);
    }
}

function playSoundFromPool(sound) {
    sound.source = audioContext.createBufferSource();
    sound.source.buffer = sound.buffer;
    sound.source.connect(audioContext.destination);
    sound.source.start(0);
    sound.lastPlayed = Date.now();
    
    // Clean up when sound finishes
    sound.source.onended = () => {
        sound.source = null;
    };
}

// Fallback sound playback
function playFallbackSound(soundName) {
    try {
        const audio = fallbackAudioElements[soundName];
        if (audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log('Fallback audio play failed:', e));
        }
    } catch (error) {
        console.error('Fallback sound error:', error);
    }
}

// Validate email format
function isValidEmail(email) {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailRegex.test(email);
}

// Generate a unique key from email
function generateUserKey(email) {
  // Simple hash function to create a consistent key from email
  let hash = 0;
  for (let i = 0; i < email.length; i++) {
    hash = ((hash << 5) - hash) + email.charCodeAt(i);
    hash = hash & hash;
  }
  return 'user_' + Math.abs(hash).toString(16);
}

// Start chat session
async function startChat() {
  playSound('click');
  
  const email = emailInput.value.trim();
  const concernRadio = document.querySelector('input[name="concern"]:checked');
  
  if (!email) {
    showMessage('error', 'Email Required', 'Please enter your email address');
    emailInput.focus();
    return;
  }
  
  if (!isValidEmail(email)) {
    showMessage('error', 'Invalid Email', 'Please enter a valid email address');
    emailInput.focus();
    return;
  }
  
  if (!concernRadio) {
    showMessage('error', 'Concern Required', 'Please select a concern type');
    return;
  }
  
  // Show loading state
  startChatBtn.disabled = true;
  document.getElementById('btnText').classList.add('hidden');
  document.getElementById('btnLoading').classList.remove('hidden');
  
  try {
    // Generate user key from email
    currentUserEmail = email;
    currentUserKey = generateUserKey(email);
    currentConcern = concernRadio.value;
    
    // Create or get user session in Firebase
    const userRef = database.ref(`users/${currentUserKey}`);
    const snapshot = await userRef.once('value');
    
    if (!snapshot.exists()) {
      // New user - create session
      await userRef.set({
        email: currentUserEmail,
        concern: currentConcern,
        createdAt: Date.now(),
        lastActive: Date.now()
      });
      
      showMessage('success', 'Welcome!', 'Your chat session has been created');
    } else {
      // Existing user - update last active
      await userRef.update({
        lastActive: Date.now(),
        concern: currentConcern
      });
      
      showMessage('success', 'Welcome Back!', 'Continuing from your previous chat session');
    }
    
    // Hide modal and show app
    formModal.classList.remove('active');
    setTimeout(() => {
      formModal.classList.add('hidden');
      appContainer.classList.remove('hidden');
      
      // Load messages
      loadMessages();
      
      // Send welcome message if new session
      if (!snapshot.exists()) {
        setTimeout(() => {
          sendSystemMessage("Hello! Welcome to Kimi Support. How can I assist you today? Our team is available 24/7 to help with your '" + currentConcern + "' concern.");
        }, 1000);
      }
    }, 300);
    
  } catch (error) {
    console.error('Error starting chat:', error);
    showMessage('error', 'Connection Error', 'Unable to start chat. Please try again.');
  } finally {
    // Reset button state
    startChatBtn.disabled = false;
    document.getElementById('btnText').classList.remove('hidden');
    document.getElementById('btnLoading').classList.add('hidden');
  }
}

  playSound('');
  
  const message = messageInput.value.trim();

    try {

      console.error('Error sending image:', error);
      showMessage('error', 'Send Failed', 'Unable to send image. Please try again.');
      return;
    }
  } 
  // Send text message
  else if (message) {
    // Clear input
    messageInput.value = '';
    
    try {
      const messagesRef = database.ref(`chats/${currentUserKey}/messages`);
      await messagesRef.push({
        sender: 'user',
        type: 'text',
        content: message,
        timestamp: Date.now()
      });
      
      playSound('textSent');
      
    } catch (error) {
      console.error('Error sending message:', error);
      showMessage('error', 'Send Failed', 'Unable to send message. Please try again.');
      return;
    }
  } else {
    showMessage('warning', 'Empty Message', 'Please type a message or select an image');
    messageInput.focus();
    return;
  }
  
  // Update user last active
  try {
    database.ref(`users/${currentUserKey}`).update({
      lastActive: Date.now()
    });
  } catch (error) {
    console.error('Error updating last active:', error);
  }
}

// Handle image upload and preview
function handleImageUpload(file) {
  // Validate file size (5MB max)
  const maxSize = 5 * 1024 * 1024; // 5MB in bytes
  if (file.size > maxSize) {
    showMessage('error', 'File Too Large', 'Image size must be less than 5MB');
    return;
  }
  
  // Validate file type
  if (!file.type.startsWith('image/')) {
    showMessage('error', 'Invalid File', 'Please select an image file (JPEG, PNG, GIF, etc.)');
    return;
  }
  
  // Read file as data URL (base64)
  const reader = new FileReader();
  
  reader.onload = function(e) {
    selectedImageFile = file;
    selectedImageBase64 = e.target.result;
    
    // Show preview
    previewImage.src = selectedImageBase64;
    imagePreview.classList.remove('hidden');
    
    // Clear text input
    messageInput.value = '';
    messageInput.placeholder = 'Click send button to send image';
    
    showMessage('success', 'Image Selected', 'Image ready to send. Click the send button.');
  };
  
  reader.onerror = function() {
    showMessage('error', 'Upload Error', 'Failed to read image file');
  };
  
  reader.readAsDataURL(file);
  imageInput.value = ''; // Reset input
}

// Clear image preview
function clearImagePreview() {
  selectedImageFile = null;
  selectedImageBase64 = null;
  imagePreview.classList.add('hidden');
  previewImage.src = '';
  messageInput.placeholder = 'Type your message...';
}

// Load messages
function loadMessages() {
  const messagesRef = database.ref(`chats/${currentUserKey}/messages`);
  
  // Clear existing messages
  chatContainer.innerHTML = '';
  
  // Add date separator
  const today = new Date().toLocaleDateString('en-US', { 
    weekday: 'long', 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric' 
  });
  
  const dateDiv = document.createElement('div');
  dateDiv.className = 'chat-date';
  dateDiv.textContent = today;
  chatContainer.appendChild(dateDiv);
  
  // Listen for new messages
  messagesRef.on('child_added', (snapshot) => {
    const message = snapshot.val();
    renderMessage(message);
    
    // Play receive sounds for incoming messages
    if (message.sender === 'admin') {
      if (message.type === 'image') {
        playSound('photoReceive');
      } else {
        playSound('textReceive');
      }
    }
  });
}

// Render a message
function renderMessage(message) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${message.sender}`;
  
  // Format time
  const time = new Date(message.timestamp).toLocaleTimeString('en-US', {
    hour: '2-digit',
    minute: '2-digit'
  });
  
  if (message.type === 'image') {
    messageDiv.innerHTML = `
      <div>📎</div>
      <img src="${message.content}" class="message-image" alt="Sent image" data-fullscreen="${message.content}">
      <div class="message-time">${time}</div>
    `;
    
    // Add click event to image for fullscreen
    const imgElement = messageDiv.querySelector('.message-image');
    imgElement.addEventListener('click', () => {
      fullscreenImage.src = message.content;
      fullscreenModal.classList.add('active');
      playSound('click');
    });
    
  } else {
    messageDiv.innerHTML = `
      <div>${message.content}</div>
      <div class="message-time">${time}</div>
    `;
  }
  
  chatContainer.appendChild(messageDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Initialize concern options
function initConcernOptions() {
  const options = document.querySelectorAll('.concern-option');
  options.forEach(option => {
    const radio = option.querySelector('input[type="radio"]');
    
    option.addEventListener('click', () => {
      options.forEach(opt => opt.classList.remove('active'));
      option.classList.add('active');
      radio.checked = true;
    });
    
    if (radio.checked) {
      option.classList.add('active');
    }
  });
}

deletePreview.addEventListener('click', clearImagePreview);

closeFullscreen.addEventListener('click', () => {
  fullscreenModal.classList.remove('active');
});

// Close fullscreen modal when clicking outside image
fullscreenModal.addEventListener('click', (e) => {
  if (e.target === fullscreenModal) {
    fullscreenModal.classList.remove('active');
  }
});

backBtn.addEventListener('click', async () => {
  // Show custom confirmation modal
  const confirmed = await showConfirm('End Chat Session', 'Are you sure you want to end this chat session?');
  
  if (confirmed) {
    appContainer.classList.add('hidden');
    formModal.classList.remove('hidden');
    setTimeout(() => {
      formModal.classList.add('active');
      // Reset form
      emailInput.value = '';
      document.querySelectorAll('input[name="concern"]').forEach(radio => {
        radio.checked = false;
      });
      initConcernOptions();
    }, 50);
  }
});

refreshBtn.addEventListener('click', () => {
  // Add spinning class to trigger animation
  refreshBtn.classList.add('spinning');
  
  // Load messages
  loadMessages();
  showMessage('info', 'Refreshing', 'Refreshing chat messages...');
  
  // Remove spinning class after animation completes to allow re-triggering
  setTimeout(() => {
    refreshBtn.classList.remove('spinning');
  }, 3000);
});

infoBtn.addEventListener('click', () => {
  showMessage('info', 'Support Information', 
    'Kimi Support\nAvailable 24/7\nEmail: kimiapi92@gmail.com\nResponse Time: Usually within minutes', 
    5000);
});

// Confirmation modal event listeners
confirmCancelBtn.addEventListener('click', () => {
  confirmModal.classList.remove('active');
  if (confirmPromiseResolve) {
    confirmPromiseResolve(false);
    confirmPromiseResolve = null;
  }
});

confirmOkBtn.addEventListener('click', () => {
  confirmModal.classList.remove('active');
  if (confirmPromiseResolve) {
    confirmPromiseResolve(true);
    confirmPromiseResolve = null;
  }
});

// Close confirmation modal when clicking outside
confirmModal.addEventListener('click', (e) => {
  if (e.target === confirmModal) {
    confirmModal.classList.remove('active');
    if (confirmPromiseResolve) {
      confirmPromiseResolve(false);
      confirmPromiseResolve = null;
    }
  }
});

// Initialize the app
function initApp() {
  initConcernOptions();
  addClickSoundToButtons();
  
  // Auto-show modal on load
  setTimeout(() => {
    formModal.classList.add('active');
  }, 100);
  
  // Show welcome message
  setTimeout(() => {
    showMessage('info', 'Welcome', 'Please fill in the form to start chatting', 4000);
  }, 1500);
}

// Start the app
document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
